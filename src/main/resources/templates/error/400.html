<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${status} + ' - ' + ${error}">400 - Bad Request</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1 th:text="${status} + ' - ' + ${error}">400 - Bad Request</h1>

    <div class="error-box">
        <p><strong>Error:</strong> <span th:text="${error}">Bad Request</span></p>
        <p><strong>Message:</strong> <span th:text="${message}">The requested resource could not be found.</span>
        </p>
    </div>

    <p>The page or resource you requested does not exist.</p>

    <div class="actions">
        <a th:href="@{/attractions}" class="button">Back to attractions</a>
    </div>
</div>
</body>
</html>
